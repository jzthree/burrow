  <circle cx="88" cy="492" r="4" fill="#34a853"/>
  <text x="106" y="490" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">prod-db</text>
  <rect x="106" y="496" width="46" height="17" rx="4" fill="#f0f0f2"/>
