  <!-- group: bastion.example.com (direct) -->
  <rect x="72" y="437" width="18" height="18" rx="5" fill="#f0f0f2"/>
  <text x="77" y="450" class="mono" font-size="9" font-weight="700" fill="#98989d">&gt;_</text>
  <text x="98" y="450" class="mono" font-size="10.5" font-weight="700" fill="#98989d" letter-spacing="0.2">bastion.example.com</text>
  <rect x="253" y="438" width="60" height="18" rx="9" fill="#f0f0f2"/>
